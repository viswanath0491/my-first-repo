<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at top, #111 0%, #000 65%, #000 100%); color: #fff; min-height: 100vh; }
    .top-bar { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); color: #111; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
    .logo { font-size: 1.8rem; font-weight: 700; color: #111; background: none; -webkit-background-clip: unset; -webkit-text-fill-color: unset; background-clip: unset; }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a { color: #111; text-decoration: none; font-weight: 600; position: relative; transition: all 0.3s ease; }
    .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: linear-gradient(135deg, #667eea, #764ba2); transition: width 0.3s ease; }
    .nav-links a:hover::after { width: 100%; }
    .content { padding: 60px 40px; max-width: 900px; margin: auto; }
    .content h1 { font-size: 2.5rem; color: #fff; margin-bottom: 50px; text-align: center; animation: fadeInDown 0.8s ease-out; }
    .contact-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
    .contact-card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); text-align: center; transition: all 0.3s ease; animation: fadeInUp 0.8s ease-out; }
    .contact-card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); }
    .contact-card .icon { font-size: 2.5rem; margin-bottom: 15px; }
    .contact-card h3 { color: #667eea; margin: 15px 0; font-size: 1.2rem; }
    .contact-card p { color: #666; line-height: 1.6; word-break: break-all; }
    .contact-card a { color: #667eea; text-decoration: none; font-weight: 600; }
    .contact-card a:hover { text-decoration: underline; }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { .content { padding: 40px 20px; } .content h1 { font-size: 2rem; } }
  </style>
</head>

        <div class="icon">📧</div>
        <h3>Email</h3>

      </div>
      
      <div class="contact-card">
        <div class="icon">📞</div>
        <h3>Phone</h3>
        <p><a href="tel:+916369993921">+91 6369993921</a></p>
      </div>
      
      <div class="contact-card">
        <div class="icon">📍</div>
        <h3>Location</h3>
        <p>Thiruvarur, Tamil Nadu, India</p>
      </div>

      <div class="contact-card">
        <div class="icon">🔗</div>
        <h3>LinkedIn</h3>
        <p><a href="https://www.linkedin.com/in/viswanath-d-b04b08342/ target="_blank">linkedin.com/in/viswanath</a></p>
      </div>

      <div class="contact-card">
        <div class="icon">💻</div>
        <h3>GitHub</h3>

    </div>
  </main>
</body>
</html>
